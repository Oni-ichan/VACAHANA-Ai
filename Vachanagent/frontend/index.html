<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vachana AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Vachana AI</h1>
        <div style="display: flex; gap: 10px; align-items: center">
          <div id="status" class="status disconnected">Disconnected</div>
        </div>
      </header>

      <main>
        <div class="auth-section" id="auth-section">
          <div
            class="description-box"
            style="
              margin-bottom: 20px;
              padding: 15px;
              background: #f5f5f5;
              border-radius: 8px;
              text-align: left;
            "
          >
            <h3>Vachana AI:</h3>
            <ul style="margin: 10px 0 20px 20px">
              <li>
                <strong>Voice-First:</strong> Low latency voice interaction
              </li>
              <li>
                <strong>Multilingual:</strong> Speak in different languages
              </li>
            </ul>
          </div>
          <p>Click below to connect to Vachana AI.</p>
          <button id="connectBtn" class="btn">Connect</button>
        </div>

        <div class="session-end-section hidden" id="session-end-section">
          <h2>Session Ended</h2>
          <button id="restartBtn" class="btn">Start New Session</button>
        </div>

        <div class="app-section hidden" id="app-section">
          <div class="app-grid">
            <div class="chat-container">
              <div class="controls">
                <button id="micBtn" class="btn icon-btn">Start Mic</button>
                <button id="locationBtn" class="btn icon-btn secondary">
                  Share Location
                </button>
                <button id="disconnectBtn" class="btn icon-btn danger">
                  Disconnect
                </button>
              </div>

              <div class="chat-log" id="chat-log"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="/static/media-handler.js"></script>
    <script src="/static/gemini-client.js"></script>
    <script src="/static/main.js"></script>
  </body>
</html>
